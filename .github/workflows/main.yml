name: build

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

env:
  PYTEST_ADDOPTS: "--color=yes"

jobs:
  test:
    name: Test - Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version:
          - "3.11"
          - "3.12"
          - "3.13"

    steps:
      - uses: actions/checkout@v6
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install Tox
        run: pip install tox tox-gh-actions
      - name: Run Tox
        run: tox
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5


  lint:
    name: Lint
    runs-on: ubuntu-latest
    strategy:
      matrix:
        tox_env: [ruff, docs]

    steps:
      - uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install Tox
        run: pip install tox
      - name: Run tox
        run: tox -e ${{ matrix.tox_env }}


  deploy:
    name: Deploy
    environment: Deployment
    needs: [test, lint]
    runs-on: ubuntu-latest
    if: ${{ github.ref=='refs/heads/main' && github.event_name!='pull_request' }}

    steps:
      - uses: actions/checkout@v6
      - name: Install uv
        uses: astral-sh/setup-uv@v7
      - name: Check if new release
        id: check_release
        shell: python
        run: |
          import tomllib, urllib.request, json, os
          with open("pyproject.toml", "rb") as f:
              current = tomllib.load(f)["project"]["version"]
          try:
              data = json.load(urllib.request.urlopen("https://pypi.org/pypi/django-elevate/json"))
              published = data["info"]["version"]
          except Exception:
              published = ""
          new_release = current != published
          with open(os.environ["GITHUB_OUTPUT"], "a") as out:
              out.write(f"new_release={'true' if new_release else 'false'}\n")
              out.write(f"version={current}\n")
      - name: Build and publish
        if: steps.check_release.outputs.new_release == 'true'
        env:
          UV_PUBLISH_TOKEN: ${{ secrets.PYPI_PASSWORD }}
        run: |
          uv build
          uv publish
